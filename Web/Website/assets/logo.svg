<!-- SSOEngine Logo Placeholder -->
<svg width="200" height="200" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="logoGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00a8ff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0088cc;stop-opacity:1" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="4" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Background circle -->
  <circle cx="100" cy="100" r="90" fill="#0a0e27" stroke="#2a2e4a" stroke-width="2"/>
  
  <!-- Game controller shape -->
  <path d="M 50 80 Q 50 60, 70 60 L 130 60 Q 150 60, 150 80 L 150 120 Q 150 140, 130 140 L 120 140 Q 110 140, 110 130 L 110 120 L 90 120 L 90 130 Q 90 140, 80 140 L 70 140 Q 50 140, 50 120 Z" 
        fill="url(#logoGradient)" 
        filter="url(#glow)"/>
  
  <!-- D-pad -->
  <rect x="65" y="75" width="8" height="20" fill="#0a0e27" rx="2"/>
  <rect x="58" y="82" width="22" height="8" fill="#0a0e27" rx="2"/>
  
  <!-- Action buttons -->
  <circle cx="125" cy="80" r="4" fill="#0a0e27"/>
  <circle cx="135" cy="90" r="4" fill="#0a0e27"/>
  <circle cx="125" cy="100" r="4" fill="#0a0e27"/>
  <circle cx="115" cy="90" r="4" fill="#0a0e27"/>
  
  <!-- SSO text -->
  <text x="100" y="165" font-family="Arial, sans-serif" font-size="18" font-weight="bold" text-anchor="middle" fill="url(#logoGradient)">SSO</text>
  
  <!-- Engine text -->
  <text x="100" y="180" font-family="Arial, sans-serif" font-size="10" text-anchor="middle" fill="#b8bcc8">ENGINE</text>
</svg>
