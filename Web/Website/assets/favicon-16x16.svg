<!-- Favicon 16x16 -->
<svg width="16" height="16" viewBox="0 0 16 16" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="faviconGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00a8ff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0088cc;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="16" height="16" fill="#0a0e27" rx="2"/>
  
  <!-- Simplified controller -->
  <path d="M 4 6.5 Q 4 5, 5.5 5 L 10.5 5 Q 12 5, 12 6.5 L 12 9.5 Q 12 11, 10.5 11 L 9.5 11 Q 9 11, 9 10.5 L 9 9.5 L 7 9.5 L 7 10.5 Q 7 11, 6.5 11 L 5.5 11 Q 4 11, 4 9.5 Z" 
        fill="url(#faviconGradient)"/>
  
  <!-- D-pad -->
  <rect x="5" y="6" width="1" height="3" fill="#0a0e27"/>
  <rect x="4" y="6.5" width="3" height="1" fill="#0a0e27"/>
  
  <!-- Buttons -->
  <circle cx="10" cy="6" r="0.5" fill="#0a0e27"/>
  <circle cx="10.5" cy="6.5" r="0.5" fill="#0a0e27"/>
</svg>
