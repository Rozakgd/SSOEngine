<!-- Favicon 32x32 -->
<svg width="32" height="32" viewBox="0 0 32 32" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="favicon32Gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00a8ff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0088cc;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="32" height="32" fill="#0a0e27" rx="4"/>
  
  <!-- Controller -->
  <path d="M 8 13 Q 8 10, 11 10 L 21 10 Q 24 10, 24 13 L 24 19 Q 24 22, 21 22 L 19 22 Q 18 22, 18 21 L 18 19 L 14 19 L 14 21 Q 14 22, 13 22 L 11 22 Q 8 22, 8 19 Z" 
        fill="url(#favicon32Gradient)"/>
  
  <!-- D-pad -->
  <rect x="10" y="12" width="2" height="6" fill="#0a0e27" rx="1"/>
  <rect x="8" y="13" width="6" height="2" fill="#0a0e27" rx="1"/>
  
  <!-- Action buttons -->
  <circle cx="20" cy="12" r="1" fill="#0a0e27"/>
  <circle cx="22" cy="14" r="1" fill="#0a0e27"/>
  <circle cx="20" cy="16" r="1" fill="#0a0e27"/>
  <circle cx="18" cy="14" r="1" fill="#0a0e27"/>
  
  <!-- SSO text -->
  <text x="16" y="28" font-family="Arial, sans-serif" font-size="4" font-weight="bold" text-anchor="middle" fill="url(#favicon32Gradient)">SSO</text>
</svg>
